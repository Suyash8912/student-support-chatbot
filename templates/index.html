<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Student Support Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="chat-container">

    <div class="header">
        🎓 AI Student Support Chatbot
        <div style="font-size:13px; font-weight:normal; margin-top:2px;">
            by Suyash
        </div>
</div>
    <div class="chat-box" id="chatBox">

        <div class="bot-message">
            👋 Hello! I'm your Student Support Assistant, made by Suyash.
            <br><br>
            Ask me anything about:
            <br>• Admission
            <br>• Fees
            <br>• Courses
            <br>• Exams
            <br>• Attendance
        </div>

    </div>

    <div class="input-area">
        <input
            type="text"
            id="userInput"
            placeholder="Type your question..."
        >

        <button onclick="sendMessage()">
            Send
        </button>
    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
<div style="text-align:center; padding:10px; color:#888; font-size:14px;">
    Made with ❤️ by Suyash
</div>
</body>
</html>
